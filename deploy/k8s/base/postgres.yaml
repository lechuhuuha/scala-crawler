apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: scala-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: scala_crawler
            - name: POSTGRES_USER
              value: scala_crawler
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scala-crawler-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: scala-crawler
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
