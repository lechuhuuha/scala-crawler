apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: scala-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/lechuhuuha/scala-crawler-control-plane:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: control-plane-config
          env:
            - name: CONTROL_PLANE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: scala-crawler-secrets
                  key: CONTROL_PLANE_DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: scala-crawler
spec:
  selector:
    app: control-plane
  ports:
    - port: 8080
      targetPort: 8080
