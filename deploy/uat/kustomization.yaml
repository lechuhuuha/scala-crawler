apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../k8s/base
patches:
  - target:
      kind: Deployment
      name: control-plane
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/lechuhuuha/scala-crawler-control-plane:uat
  - target:
      kind: Deployment
      name: worker
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/lechuhuuha/scala-crawler-worker:uat
